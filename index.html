<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベント管理ポータル</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333333;
            --card-bg: #ffffff;
            --primary: #4a90e2;
            --primary-hover: #357abd;
            --accent-1: #ff6b6b;
            --accent-2: #1dd1a1;
            --accent-3: #f39c12;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            color: #666;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* リンクカードのデザイン */
        .link-card {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            padding: 25px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        /* 左側のカラーバー */
        .link-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
        }

        .card-stamp::before { background-color: var(--accent-1); }
        .card-ticket::before { background-color: var(--accent-2); }
        .card-holiday::before { background-color: var(--accent-3); }

        .card-icon {
            font-size: 2rem;
            margin-right: 20px;
            width: 50px;
            text-align: center;
        }

        .card-content {
            flex-grow: 1;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0 0 5px 0;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #777;
            margin: 0;
        }

        .card-arrow {
            color: #ccc;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .link-card:hover .card-arrow {
            transform: translateX(5px);
            color: var(--primary);
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 イベント管理ポータル</h1>
        <p>確認したいシートを選択してください</p>
    </div>

    <div class="link-list">
        <a href="https://script.google.com/macros/s/AKfycbwcOSujT-Qqivo7Ghob53_0PxsQWnqsAkEk83539NfmckHzA3Z2gf5Y0dUNJ1jvdeXV/exec" target="_blank" class="link-card card-ticket">
            <div class="card-icon">🎟️</div>
            <div class="card-content">
                <h2 class="card-title">2階催事　クーポン利用状況</h2>
                <p class="card-desc">催事クーポンの利用実績データを確認</p>
            </div>
            <div class="card-arrow">➔</div>
        </a>

        <a href="https://script.google.com/macros/s/AKfycbxZjLW33e4Kja4FIn2WiTtGM0o5Qs0-ND-v0Jq6K8gE82zNEkVM2tTHdoMU6SPIRKrcNg/exec" target="_blank" class="link-card card-stamp">
            <div class="card-icon">🎯</div>
            <div class="card-content">
                <h2 class="card-title">B1スタンプラリー　利用状況</h2>
                <p class="card-desc">ガラポン抽選やスタンプラリーの利用履歴を確認</p>
            </div>
            <div class="card-arrow">➔</div>
        </a>

        <a href="https://script.google.com/macros/s/AKfycbxiQzx74xrVGVX_3KF4tUyRQpwxDl4a7GnejkdQYyw0xgZmaPi6dZMqbbBItRe5s6wAfQ/exec?mode=view" target="_blank" class="link-card card-holiday">
            <div class="card-icon">🎡</div>
            <div class="card-content">
                <h2 class="card-title">休日限定クーポン　利用状況</h2>
                <p class="card-desc">クレーンゲーム無料券の利用集計・グラフを確認</p>
            </div>
            <div class="card-arrow">➔</div>
        </a>
    </div>
</div>

</body>
</html>
